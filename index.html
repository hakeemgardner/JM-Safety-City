<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/grid-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>G.R.I.D — Geo-Referenced Incident Database | Kingston, Jamaica Crime Map</title>
    <meta name="description" content="G.R.I.D (Geo-Referenced Incident Database) is a real-time community safety platform for Kingston, Jamaica. Report incidents anonymously, view live crime heatmaps, and stay informed about safety in your neighborhood." />
    <meta name="keywords" content="Kingston Jamaica crime map, Jamaica safety, crime reporting, incident database, community safety, real-time crime tracker, Kingston heatmap, anonymous crime reporting" />
    <meta name="author" content="G.R.I.D" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://grid-jamaica.com" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="G.R.I.D — Real-Time Crime Mapping for Kingston, Jamaica" />
    <meta property="og:description" content="Stay informed, stay safe. Monitor active incidents and report emergencies instantly with geo-referenced intelligence for Kingston, Jamaica." />
    <meta property="og:site_name" content="G.R.I.D" />
    <meta property="og:locale" content="en_JM" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="G.R.I.D — Geo-Referenced Incident Database" />
    <meta name="twitter:description" content="Real-time community safety platform for Kingston, Jamaica. View live crime heatmaps and report incidents anonymously." />

    <!-- Theme -->
    <meta name="theme-color" content="#0d7ff2" />
    <meta name="msapplication-TileColor" content="#101922" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "G.R.I.D",
        "alternateName": "Geo-Referenced Incident Database",
        "description": "Real-time community safety and crime reporting platform for Kingston, Jamaica",
        "applicationCategory": "SecurityApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "areaServed": {
          "@type": "City",
          "name": "Kingston",
          "containedInPlace": { "@type": "Country", "name": "Jamaica" }
        }
      }
    </script>
  </head>
  <body>
    <div
      id="root"
      class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen"
    ></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
